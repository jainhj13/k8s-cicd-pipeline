name: Kubernetes CI/CD

on:
push:
branches: [ main ]

env:
IMAGE: jainhj/flask-k8s-app
FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
test:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v4
with:
python-version: '3.10'
- run: pip install -r requirements.txt
- run: pytest

build-push:
needs: test
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4

```
  - name: Login to Docker Hub
    run: echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u jainhj --password-stdin

  - name: Build & Push Docker Image
    run: |
      docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
      docker push $IMAGE:${{ github.sha }}
      docker push $IMAGE:latest
```

deploy:
needs: build-push
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4

```
  - uses: azure/setup-kubectl@v3

  - name: Configure kubeconfig
    run: echo ${{ secrets.KUBECONFIG }} | base64 -d > kube.yaml

  - name: Deploy to Kubernetes
    env:
      KUBECONFIG: kube.yaml
    run: |
      kubectl set image deployment/flask-app flask=$IMAGE:${{ github.sha }}
      kubectl rollout status deployment/flask-app
```

