name: Kubernetes CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE: jainhj/flask-k8s-app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username jainhj --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE:${{ github.sha }} .

      - name: Push Docker image
        run: docker push $IMAGE:${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > kubeconfig.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/flask-app flask=$IMAGE:${{ github.sha }} --kubeconfig=kubeconfig.yaml
          kubectl rollout status deployment/flask-app --kubeconfig=kubeconfig.yaml
